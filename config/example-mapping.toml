# Vader 5 Pro — padctl mapping example
# Install: copy to ~/.config/padctl/mappings/
# Usage:
#   padctl switch vader5-pro          # switch at runtime (no restart)
#   padctl --mapping <path>           # one-off load by path
#   config.toml default_mapping = "vader5-pro"  # auto-load on device connect

name = "vader5-pro"

[gyro]
mode = "off"                 # "off" or "mouse"

[stick.left]
deadzone = 128               # 0–32767

[stick.right]
deadzone = 128

[dpad]
mode = "gamepad"             # "gamepad" or "arrows"

# ═══════════════════════════════════════════════════════════════
# Base Remaps — active when no layer is held
# ═══════════════════════════════════════════════════════════════
[remap]
M1 = "KEY_F13"               # back paddle → media / macro key
M2 = "KEY_F14"
M3 = "mouse_left"            # grip button → left click
M4 = "mouse_right"
M5 = "mouse_forward"         # extra side button → browser forward (XF86Forward)
M6 = "mouse_back"            # extra side button → browser back  (XF86Back)
C  = "disabled"              # silence an unused button
Z  = "KEY_LEFTMETA"          # extra button → Super key
LM = "macro:dodge_roll"      # left menu → dodge macro
RM = "R3"                    # right menu → R3 (click)

# ═══════════════════════════════════════════════════════════════
# Layer: aim — hold LM for gyro mouse + aim buttons
# ═══════════════════════════════════════════════════════════════
[[layer]]
name        = "aim"
trigger     = "LM"
activation  = "hold"
tap         = "mouse_side"   # short-tap fires mouse side button
hold_timeout = 200           # ms; tap fires if released before this

[layer.gyro]
mode        = "mouse"
sensitivity = 2.0
smoothing   = 0.3

[layer.stick_left]
mode = "scroll"              # left stick scrolls while aiming

[layer.stick_right]
mode             = "mouse"
sensitivity      = 1.0
suppress_gamepad = true      # no duplicate gamepad axis events

[layer.dpad]
mode             = "arrows"
suppress_gamepad = true

[layer.remap]
RB = "mouse_left"
RT = "mouse_right"
LB = "KEY_LEFTSHIFT"         # ADS sprint
A  = "KEY_LEFTMETA"

[layer.adaptive_trigger]
mode = "weapon"

[layer.adaptive_trigger.left]
start    = 30
end      = 120
strength = 200

# ═══════════════════════════════════════════════════════════════
# Layer: fn — toggle with Select for F-key row
# ═══════════════════════════════════════════════════════════════
[[layer]]
name       = "fn"
trigger    = "Select"
activation = "toggle"        # press once to enter, again to exit

[layer.remap]
A = "KEY_F1"
B = "KEY_F2"
X = "KEY_F3"
Y = "KEY_F4"

# ═══════════════════════════════════════════════════════════════
# Layer: wasd — toggle with RB for DPad-as-WASD movement
# ═══════════════════════════════════════════════════════════════
[[layer]]
name       = "wasd"
trigger    = "RB"
activation = "toggle"

[layer.remap]
DPadUp    = "KEY_W"
DPadDown  = "KEY_S"
DPadLeft  = "KEY_A"
DPadRight = "KEY_D"

# ═══════════════════════════════════════════════════════════════
# Macros
# ═══════════════════════════════════════════════════════════════
[[macro]]
name  = "dodge_roll"
steps = [
    { tap = "B" },
    { delay = 50 },
    { tap = "LEFT" },
]
