name: e2e
on: [push, pull_request]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the canonical build image reference from .zigversion (ADR-019).
  # GitHub Actions cannot read a file inside a `container:` expression, so the
  # tag is computed once here and consumed via needs.image-ref.outputs.ref.
  # Mirrors the image-ref job in ci.yml — .zigversion stays the single source
  # of truth for the Zig version.
  image-ref:
    name: image-ref
    runs-on: ubuntu-22.04
    outputs:
      ref: ${{ steps.img.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image reference
        id: img
        run: |
          set -euo pipefail
          ver="$(head -n1 .zigversion | tr -d '[:space:]')"
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=ghcr.io/${owner}/padctl-build:${ver}" >> "$GITHUB_OUTPUT"

  e2e:
    runs-on: ubuntu-22.04
    needs: [image-ref]
    # Run inside the canonical build image (ADR-019): Zig + libusb are baked
    # in. --privileged is required so the UHID L2/L3 tests can load the uhid
    # kernel module and access /dev/uhid from inside the container.
    container:
      image: ${{ needs.image-ref.outputs.ref }}
      options: --privileged -v /dev:/dev
    # debian:bookworm-slim links /bin/sh to dash; force bash for run: steps.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Enable UHID/uinput (best-effort)
        run: |
          modprobe uhid uinput 2>/dev/null || true
          chmod 666 /dev/uhid /dev/uinput 2>/dev/null || true
      - name: Probe /dev/uhid accessibility
        id: uhid_probe
        run: |
          if [ -r /dev/uhid ] && [ -w /dev/uhid ]; then
            echo "uhid_ok=true" >> "$GITHUB_OUTPUT"
            echo "UHID gate ENABLED — /dev/uhid is accessible, enforcing PADCTL_TEST_REQUIRE_UHID=1"
          else
            echo "uhid_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::UHID gate DISABLED — /dev/uhid not accessible on this runner. Layer 2/3 tests will skip."
          fi
      - name: Probe /dev/uinput accessibility
        id: uinput_probe
        run: |
          if [ -r /dev/uinput ] && [ -w /dev/uinput ]; then
            echo "uinput_ok=true" >> "$GITHUB_OUTPUT"
            echo "uinput gate ENABLED — /dev/uinput is accessible, enforcing PADCTL_TEST_REQUIRE_UINPUT=1"
          else
            echo "uinput_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::uinput gate DISABLED — /dev/uinput not accessible on this runner. shadow-grab integration test will skip."
          fi
      - name: Run e2e tests
        env:
          # The L3 e2e pipeline exercises BOTH /dev/uhid (input) and /dev/uinput
          # (output), so enforce both gates when the devices are accessible.
          PADCTL_TEST_REQUIRE_UHID: ${{ steps.uhid_probe.outputs.uhid_ok == 'true' && '1' || '0' }}
          PADCTL_TEST_REQUIRE_UINPUT: ${{ steps.uinput_probe.outputs.uinput_ok == 'true' && '1' || '0' }}
        run: zig build test-e2e
      - name: Run integration tests (UHID + uinput)
        if: steps.uhid_probe.outputs.uhid_ok == 'true' || steps.uinput_probe.outputs.uinput_ok == 'true'
        env:
          PADCTL_TEST_REQUIRE_UHID: ${{ steps.uhid_probe.outputs.uhid_ok == 'true' && '1' || '0' }}
          PADCTL_TEST_REQUIRE_UINPUT: ${{ steps.uinput_probe.outputs.uinput_ok == 'true' && '1' || '0' }}
        run: zig build test-integration
      - name: Run UHID kernel-touching unit tests (test-uhid)
        if: steps.uhid_probe.outputs.uhid_ok == 'true'
        env:
          PADCTL_TEST_REQUIRE_UHID: "1"
        run: zig build test-uhid

  # Negative proof for the PADCTL_TEST_REQUIRE_UHID gate. Runs in a plain
  # (non-privileged, no /dev mount) container where /dev/uhid is absent, so
  # PADCTL_TEST_REQUIRE_UHID=1 must turn the L3 e2e suite RED instead of
  # silently SkipZigTest-ing to green. This step is RED on pre-gate main
  # (test-e2e exits 0 via skips) and GREEN once the gate enforces. Kept as its
  # own job so it can never poison the privileged `e2e` job's real device runs.
  e2e-gate-proof:
    name: e2e-gate-proof
    runs-on: ubuntu-22.04
    needs: [image-ref]
    container:
      image: ${{ needs.image-ref.outputs.ref }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Assert REQUIRE_UHID hard-fails when /dev/uhid is absent
        run: |
          set -uo pipefail
          if [ -e /dev/uhid ]; then
            echo "::error::/dev/uhid unexpectedly present in the unprivileged gate-proof container — cannot prove the gate"
            exit 1
          fi
          if PADCTL_TEST_REQUIRE_UHID=1 zig build test-e2e; then
            echo "::error::test-e2e exited 0 with PADCTL_TEST_REQUIRE_UHID=1 and no /dev/uhid — the gate is NOT enforcing (silent SkipZigTest regression)"
            exit 1
          fi
          echo "OK: PADCTL_TEST_REQUIRE_UHID=1 turned the absent-/dev/uhid e2e run RED as required"
