[device]
name = "Xbox Elite Series 2"
vid = 0x045e
pid = 0x0b00

[[device.interface]]
id = 0
class = "hid"

# --- USB HID input (Report ID 0x01, 64 bytes) ---
# GIP protocol; report structure follows XInput HID descriptor.
[[report]]
name = "usb"
interface = 0
size = 64

[report.match]
offset = 0
expect = [0x01]

[report.fields]
left_x  = { offset = 1, type = "i16le" }
left_y  = { offset = 3, type = "i16le", transform = "negate" }
right_x = { offset = 5, type = "i16le" }
right_y = { offset = 7, type = "i16le", transform = "negate" }
lt      = { offset = 9,  type = "u16le", transform = "scale(0, 255)" }
rt      = { offset = 11, type = "u16le", transform = "scale(0, 255)" }

[report.button_group]
# byte 13: bits 0-3 = Paddle P1-P4 (mapped as M1-M4)
# bytes 14-15: standard button layout
# TODO: paddle bit positions (byte 13 bits 0-3) need verification with real hardware capture
source = { offset = 13, size = 3 }
map = { M1 = 0, M2 = 1, M3 = 2, M4 = 3, A = 8, B = 9, X = 10, Y = 11, LB = 12, RB = 13, Select = 14, Start = 15, LS = 16, RS = 17, Home = 18 }

# --- Commands ---
[commands.rumble]
interface = 0
template = "09 00 00 09 00 0f {strong:u8} {weak:u8} {left_trigger:u8} {right_trigger:u8} ff 00 00"

# --- Output device ---
[output]
name = "Xbox Elite Series 2"
vid = 0x045e
pid = 0x0b00

[output.axes]
left_x  = { code = "ABS_X",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
left_y  = { code = "ABS_Y",  min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_x = { code = "ABS_RX", min = -32768, max = 32767, fuzz = 16, flat = 128 }
right_y = { code = "ABS_RY", min = -32768, max = 32767, fuzz = 16, flat = 128 }
lt      = { code = "ABS_Z",  min = 0, max = 255 }
rt      = { code = "ABS_RZ", min = 0, max = 255 }

[output.buttons]
A      = "BTN_SOUTH"
B      = "BTN_EAST"
X      = "BTN_WEST"
Y      = "BTN_NORTH"
LB     = "BTN_TL"
RB     = "BTN_TR"
Select = "BTN_SELECT"
Start  = "BTN_START"
Home   = "BTN_MODE"
LS     = "BTN_THUMBL"
RS     = "BTN_THUMBR"
M1     = "BTN_TRIGGER_HAPPY1"
M2     = "BTN_TRIGGER_HAPPY2"
M3     = "BTN_TRIGGER_HAPPY3"
M4     = "BTN_TRIGGER_HAPPY4"

[output.dpad]
type = "hat"

[output.force_feedback]
type = "rumble"
max_effects = 4
